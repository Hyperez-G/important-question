<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gentle Question</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Floating Sparkles/Hearts Container -->
  <div class="particles-container" id="particles"></div>

  <!-- Ambient Light Effect -->
  <div class="ambient-glow"></div>

  <!-- Background Music -->
  <audio id="bg-music" loop preload="auto">
    <source src="music.MP3" type="audio/mpeg">
  </audio>

  <!-- Start Screen -->
  <div class="start-screen" id="start-screen">
    <div class="start-content">
      <div class="start-pulse"></div>
      <p class="start-hint">tap to begin</p>
    </div>
  </div>

  <!-- Intro Screen Overlay -->
  <div class="intro-screen" id="intro-screen">
    <div class="intro-wrapper">
      <span class="intro-hi">Hi</span>
      <span class="intro-name">Hannah Chelsy</span>
    </div>
  </div>

  <main class="card-container">
    <div class="card" id="love-card">
      <div class="card-decor">
        <svg class="heart-icon-top" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/>
        </svg>
      </div>
      
      <h1 class="question-title">Would you like to go on a date with me?</h1>
      <p class="question-subtitle">No pressure, a simple yes or no is all I ask.</p>

      <div class="button-wrapper">
        <button id="yes-btn" class="btn btn-yes">
          <span>Yes, I'd love to</span>
        </button>
        <button id="no-btn" class="btn btn-no">No</button>
      </div>
    </div>
  </main>

  <!-- Love Letter Reveal Modal -->
  <div class="modal-overlay" id="success-modal">
    <div class="envelope-wrapper">
      <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="pocket"></div>
        <div class="letter">
          <div class="letter-content">
            <svg class="letter-heart" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            <h2>I'm incredibly happy!</h2>
            <p class="letter-date" id="current-date"></p>
            <p class="letter-text">
              You just made my entire day. I can't wait to plan our perfect date and make beautiful memories together.
            </p>
            <p class="letter-signature">Yours truly ❤️</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
